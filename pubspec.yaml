name: sm_bank
description: "A new Flutter project for SM Bank."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # واجهة المستخدم والأيقونات
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

  # خدمات فايربيس الأساسية (تم تصحيح الإصدارات لأحدث نسخ مستقرة ومتوافقة)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # إدارة الحالة والبيانات
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # الرسوم البيانية والحركات والذكاء الاصطناعي
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.13.1 

# إعدادات صانع الأيقونات
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  # تعريف مجلد الصور حتى يتعرف عليه فلاتر
  assets:
    - assets/logo.png