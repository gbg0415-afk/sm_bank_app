name: sm_bank
description: "A new Flutter project for SM Bank."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # واجهة المستخدم والأيقونات
  cupertino_icons: ^1.0.8
  lucide_icons: any 

  # خدمات فايربيس الأساسية
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

  # إدارة الحالة والبيانات
  provider: any 
  shared_preferences: any 

  # الرسوم البيانية والحركات والذكاء الاصطناعي
  fl_chart: any 
  flutter_animate: any 
  google_generative_ai: any 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.13.1 

# إعدادات صانع الأيقونات
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  # تعريف مجلد الصور حتى يتعرف عليه فلاتر
  assets:
    - assets/logo.png