name: sm_bank
description: SM Academy - Medical Quiz App
publish_to: 'none'
version: 1.0.0+1
 
environment:
  sdk: '>=3.0.0 <4.0.0'
 
dependencies:
  flutter:
    sdk: flutter
 
  # Firebase Core (required for all Firebase services)
  firebase_core: ^3.6.0
 
  # Firebase Authentication
  firebase_auth: ^5.3.1
 
  # Cloud Firestore (database)
  cloud_firestore: ^5.4.4
 
  cupertino_icons: ^1.0.8
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.13.1 

# إعدادات صانع الأيقونات
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  # تعريف مجلد الصور حتى يتعرف عليه فلاتر
  assets:
    - assets/logo.png